name: Release

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.node_platform }}-${{ matrix.node_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { node_platform: darwin, node_arch: arm64 }
          - { node_platform: darwin, node_arch: x64 }
          - { node_platform: linux,  node_arch: arm64 }
          - { node_platform: linux,  node_arch: x64 }
          - { node_platform: win32,  node_arch: arm64 }
          - { node_platform: win32,  node_arch: x64 }
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set version from tag
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build platform package (downloads, verifies SHA-256, sanity-checks binary)
        env:
          NODE_PLATFORM: ${{ matrix.node_platform }}
          NODE_ARCH: ${{ matrix.node_arch }}
        run: |
          scripts/build-platform-package.sh \
            "$VERSION" \
            "$NODE_PLATFORM" \
            "$NODE_ARCH" \
            "dist/$NODE_PLATFORM-$NODE_ARCH"

      - name: Upload subpackage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: subpackage-${{ matrix.node_platform }}-${{ matrix.node_arch }}
          path: dist/${{ matrix.node_platform }}-${{ matrix.node_arch }}
          retention-days: 1
          if-no-files-found: error

  publish-platform:
    name: Publish ${{ matrix.node_platform }}-${{ matrix.node_arch }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { node_platform: darwin, node_arch: arm64 }
          - { node_platform: darwin, node_arch: x64 }
          - { node_platform: linux,  node_arch: arm64 }
          - { node_platform: linux,  node_arch: x64 }
          - { node_platform: win32,  node_arch: arm64 }
          - { node_platform: win32,  node_arch: x64 }
    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download subpackage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: subpackage-${{ matrix.node_platform }}-${{ matrix.node_arch }}
          path: dist

      - name: Publish platform package (prerelease)
        if: github.event.release.prerelease
        working-directory: dist
        run: npm publish --access public --tag=canary --provenance

      - name: Publish platform package (latest)
        if: ${{ !github.event.release.prerelease }}
        working-directory: dist
        run: npm publish --access public --provenance

  publish-wrapper:
    name: Publish wrapper
    runs-on: ubuntu-latest
    needs: publish-platform
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set version from tag
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Pin version and optionalDependencies
        run: |
          jq --arg v "$VERSION" '
            .version = $v
            | .optionalDependencies = (
                .optionalDependencies
                | to_entries
                | map(.value = $v)
                | from_entries
              )
          ' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Wait for platform subpackages to be resolvable on npm
        run: |
          set -euo pipefail
          deps=$(jq -r '.optionalDependencies | keys[]' package.json)
          for dep in $deps; do
            attempt=0
            until npm view "${dep}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; do
              attempt=$((attempt + 1))
              if [ "$attempt" -ge 6 ]; then
                echo "Timed out waiting for ${dep}@${VERSION} on npm" >&2
                exit 1
              fi
              echo "Waiting for ${dep}@${VERSION} (attempt ${attempt})..."
              sleep $((attempt * 5))
            done
            echo "OK: ${dep}@${VERSION}"
          done

      - name: Publish wrapper (prerelease)
        if: github.event.release.prerelease
        run: npm publish --access public --tag=canary --provenance

      - name: Publish wrapper (latest)
        if: ${{ !github.event.release.prerelease }}
        run: npm publish --access public --provenance
