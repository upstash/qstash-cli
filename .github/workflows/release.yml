name: Release

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

jobs:
  publish-platform:
    name: Publish ${{ matrix.node_platform }}-${{ matrix.node_arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node_platform: darwin
            node_arch: arm64
          - node_platform: darwin
            node_arch: x64
          - node_platform: linux
            node_arch: arm64
          - node_platform: linux
            node_arch: x64
          - node_platform: win32
            node_arch: arm64
          - node_platform: win32
            node_arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Build platform package
        env:
          NODE_PLATFORM: ${{ matrix.node_platform }}
          NODE_ARCH: ${{ matrix.node_arch }}
        run: |
          scripts/build-platform-package.sh \
            "$VERSION" \
            "$NODE_PLATFORM" \
            "$NODE_ARCH" \
            "dist/$NODE_PLATFORM-$NODE_ARCH"

      - name: Publish platform package (prerelease)
        if: github.event.release.prerelease
        working-directory: dist/${{ matrix.node_platform }}-${{ matrix.node_arch }}
        run: npm publish --access public --tag=canary --provenance

      - name: Publish platform package (latest)
        if: ${{ !github.event.release.prerelease }}
        working-directory: dist/${{ matrix.node_platform }}-${{ matrix.node_arch }}
        run: npm publish --access public --provenance

  publish-wrapper:
    name: Publish wrapper
    runs-on: ubuntu-latest
    needs: publish-platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Pin version and optionalDependencies
        run: |
          jq --arg v "$VERSION" '
            .version = $v
            | .optionalDependencies = (
                .optionalDependencies
                | to_entries
                | map(.value = $v)
                | from_entries
              )
          ' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Publish wrapper (prerelease)
        if: github.event.release.prerelease
        run: npm publish --access public --tag=canary --provenance

      - name: Publish wrapper (latest)
        if: ${{ !github.event.release.prerelease }}
        run: npm publish --access public --provenance
